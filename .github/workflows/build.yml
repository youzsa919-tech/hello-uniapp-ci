name: Build APK & IPA

on:
  push:
    branches: [main, master]
  workflow_dispatch:

env:
  APPID: '__UNI__HelloUniApp'

jobs:

  # ============================
  # Job 1: 构建 Android APK
  # ============================
  build-android:
    name: Build Android APK
    runs-on: ubuntu-latest
    steps:
      - name: Checkout 源码
        uses: actions/checkout@v4

      - name: 安装 Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: 安装项目依赖
        run: npm install --legacy-peer-deps

      - name: 安装 uni-uts-v1 (编译器运行时)
        run: npm install @dcloudio/uni-uts-v1@3.0.0-alpha-5020120260710001 --legacy-peer-deps

      - name: 构建 uni-app (app-plus 平台)
        run: npm run build:app

      - name: 展示构建产物
        run: |
          echo "=== uni-app 构建产物 ==="
          find dist/build/app -type f | head -30
          echo "=== 总文件数 ==="
          find dist/build/app -type f | wc -l

      # ---------- 创建最小 Android 项目 ----------
      - name: 安装 JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: 安装 Android SDK
        uses: android-actions/setup-android@v3
        with:
          packages: 'platforms;android-34 build-tools;34.0.0'

      - name: 创建 Android 壳工程
        run: |
          APPID="${{ env.APPID }}"
          PACKAGE="com.hello.uniapp"

          # 项目目录结构
          mkdir -p app/src/main/java/com/hello/uniapp
          mkdir -p app/src/main/assets/apps/$APPID/www
          mkdir -p app/src/main/res/values
          mkdir -p app/src/main/res/drawable

          # 复制 uni-app 构建产物到 assets
          if [ -d "dist/build/app/www" ]; then
            cp -r dist/build/app/www/* app/src/main/assets/apps/$APPID/www/
          else
            cp -r dist/build/app/* app/src/main/assets/apps/$APPID/www/
          fi

          # settings.gradle
          cat > settings.gradle << 'EOF'
          pluginManagement {
              repositories {
                  google()
                  mavenCentral()
                  gradlePluginPortal()
              }
          }
          dependencyResolutionManagement {
              repositoriesMode.set(RepositoriesMode.FAIL_ON_PROJECT_REPOS)
              repositories {
                  google()
                  mavenCentral()
              }
          }
          rootProject.name = "HelloUniApp"
          include ':app'
          EOF

          # build.gradle (root)
          cat > build.gradle << 'EOF'
          plugins {
              id 'com.android.application' version '8.2.0' apply false
          }
          EOF

          # app/build.gradle
          cat > app/build.gradle << EOF
          plugins {
              id 'com.android.application'
          }
          android {
              namespace "$PACKAGE"
              compileSdk 34
              defaultConfig {
                  applicationId "$PACKAGE"
                  minSdk 21
                  targetSdk 34
                  versionCode 1
                  versionName "1.0.0"
              }
              buildTypes {
                  release {
                      minifyEnabled false
                  }
                  debug {
                      debuggable true
                  }
              }
              compileOptions {
                  sourceCompatibility JavaVersion.VERSION_17
                  targetCompatibility JavaVersion.VERSION_17
              }
          }
          dependencies {
              implementation 'androidx.appcompat:appcompat:1.6.1'
              implementation 'androidx.webkit:webkit:1.9.0'
          }
          EOF

          # AndroidManifest.xml
          cat > app/src/main/AndroidManifest.xml << EOF
          <?xml version="1.0" encoding="utf-8"?>
          <manifest xmlns:android="http://schemas.android.com/apk/res/android">
              <uses-permission android:name="android.permission.INTERNET" />
              <uses-permission android:name="android.permission.ACCESS_NETWORK_STATE" />
              <application
                  android:label="Hello UniApp"
                  android:supportsRtl="true"
                  android:usesCleartextTraffic="true"
                  android:hardwareAccelerated="true">
                  <activity
                      android:name=".MainActivity"
                      android:configChanges="orientation|screenSize|keyboardHidden"
                      android:exported="true">
                      <intent-filter>
                          <action android:name="android.intent.action.MAIN" />
                          <category android:name="android.intent.category.LAUNCHER" />
                      </intent-filter>
                  </activity>
              </application>
          </manifest>
          EOF

          # MainActivity.java
          cat > app/src/main/java/com/hello/uniapp/MainActivity.java << 'JAVAEOF'
          package com.hello.uniapp;

          import android.app.Activity;
          import android.os.Bundle;
          import android.webkit.WebChromeClient;
          import android.webkit.WebSettings;
          import android.webkit.WebView;
          import android.webkit.WebViewClient;

          public class MainActivity extends Activity {
              private WebView webView;

              @Override
              protected void onCreate(Bundle savedInstanceState) {
                  super.onCreate(savedInstanceState);
                  webView = new WebView(this);
                  setContentView(webView);

                  WebSettings settings = webView.getSettings();
                  settings.setJavaScriptEnabled(true);
                  settings.setDomStorageEnabled(true);
                  settings.setAllowFileAccess(true);
                  settings.setAllowContentAccess(true);
                  settings.setMediaPlaybackRequiresUserGesture(false);
                  settings.setMixedContentMode(WebSettings.MIXED_CONTENT_ALWAYS_ALLOW);

                  webView.setWebChromeClient(new WebChromeClient());
                  webView.setWebViewClient(new WebViewClient());

                  // 加载 uni-app 入口页面
                  webView.loadUrl("file:///android_asset/apps/__UNI__HelloUniApp/www/index.html");
              }

              @Override
              public void onBackPressed() {
                  if (webView.canGoBack()) {
                      webView.goBack();
                  } else {
                      super.onBackPressed();
                  }
              }
          }
          JAVAEOF

          # gradle.properties
          cat > gradle.properties << 'EOF'
          org.gradle.jvmargs=-Xmx2048m -Dfile.encoding=UTF-8
          android.useAndroidX=true
          EOF

          # 展示结构
          echo "=== Android 项目结构 ==="
          find . -maxdepth 4 -not -path '*/node_modules/*' -not -path '*/.git/*' -not -path '*/dist/*' -type f | sort

      - name: 赋予 Gradle 执行权限并编译 APK
        run: |
          # 生成 local.properties
          echo "sdk.dir=$ANDROID_HOME" > local.properties

          # 下载 gradle wrapper
          gradle wrapper --gradle-version 8.5

          # 编译 debug APK
          ./gradlew assembleDebug --no-daemon --stacktrace

      - name: 查找并上传 APK
        run: |
          APK=$(find app/build -name "*.apk" -type f | head -1)
          echo "APK: $APK"
          ls -lh "$APK"
          cp "$APK" app-debug.apk

      - name: 上传 APK 产物
        uses: actions/upload-artifact@v4
        with:
          name: app-debug-android
          path: app-debug.apk
          retention-days: 30

      - name: 上传 uni-app 资源包 (备用)
        uses: actions/upload-artifact@v4
        with:
          name: uniapp-resources
          path: dist/build/app/
          retention-days: 7


  # ============================
  # Job 2: 构建 iOS IPA (未签名)
  # ============================
  build-ios:
    name: Build iOS IPA (Unsigned)
    runs-on: macos-latest
    steps:
      - name: Checkout 源码
        uses: actions/checkout@v4

      - name: 安装 Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: 安装项目依赖
        run: npm install --legacy-peer-deps

      - name: 安装 uni-uts-v1 (编译器运行时)
        run: npm install @dcloudio/uni-uts-v1@3.0.0-alpha-5020120260710001 --legacy-peer-deps

      - name: 构建 uni-app (app-plus 平台)
        run: npm run build:app

      - name: 上传 uni-app 资源包
        uses: actions/upload-artifact@v4
        with:
          name: uniapp-resources-ios
          path: dist/build/app/
          retention-days: 7

      # iOS IPA 打包 (最小 WebView 壳)
      - name: 创建 iOS 壳工程
        run: |
          mkdir -p HelloApp/HelloApp
          mkdir -p HelloApp/HelloApp/Resources

          # 复制 uni-app 资源
          if [ -d "dist/build/app/www" ]; then
            cp -r dist/build/app/www/* HelloApp/HelloApp/Resources/
          else
            cp -r dist/build/app/* HelloApp/HelloApp/Resources/
          fi

          # Info.plist
          cat > HelloApp/HelloApp/Info.plist << 'EOF'
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
              <key>CFBundleDevelopmentRegion</key><string>en</string>
              <key>CFBundleExecutable</key><string>HelloApp</string>
              <key>CFBundleIdentifier</key><string>com.hello.uniapp</string>
              <key>CFBundleInfoDictionaryVersion</key><string>6.0</string>
              <key>CFBundleName</key><string>Hello UniApp</string>
              <key>CFBundlePackageType</key><string>APPL</string>
              <key>CFBundleShortVersionString</key><string>1.0</string>
              <key>CFBundleVersion</key><string>1</string>
              <key>LSRequiresIPhoneOS</key><true/>
              <key>UILaunchStoryboardName</key><string>LaunchScreen</string>
              <key>UIRequiredDeviceCapabilities</key><array><string>armv7</string></array>
              <key>UISupportedInterfaceOrientations</key><array><string>UIInterfaceOrientationPortrait</string></array>
              <key>NSAppTransportSecurity</key>
              <dict><key>NSAllowsArbitraryLoads</key><true/></dict>
          </dict>
          </plist>
          EOF

          # main.swift
          cat > HelloApp/HelloApp/main.swift << 'EOF'
          import UIKit
          import WebKit

          class AppDelegate: UIResponder, UIApplicationDelegate {
              var window: UIWindow?
              func application(_ application: UIApplication,
                  didFinishLaunchingWithOptions launchOptions: [UIApplication.LaunchOptionsKey: Any]?) -> Bool {
                  window = UIWindow(frame: UIScreen.main.bounds)
                  let vc = ViewController()
                  window?.rootViewController = vc
                  window?.makeKeyAndVisible()
                  return true
              }
          }

          class ViewController: UIViewController, WKNavigationDelegate {
              var webView: WKWebView!
              override func viewDidLoad() {
                  super.viewDidLoad()
                  let config = WKWebViewConfiguration()
                  config.preferences.javaScriptEnabled = true
                  webView = WKWebView(frame: view.bounds, configuration: config)
                  webView.navigationDelegate = self
                  webView.autoresizingMask = [.flexibleWidth, .flexibleHeight]
                  view.addSubview(webView)
                  if let path = Bundle.main.path(forResource: "index", ofType: "html", inDirectory: "Resources") {
                      webView.loadFileURL(URL(fileURLWithPath: path),
                          allowingReadAccessTo: URL(fileURLWithPath: Bundle.main.resourcePath!))
                  }
              }
          }

          UIApplicationMain(CommandLine.argc, CommandLine.unsafeArgv, nil,
              NSStringFromClass(AppDelegate.self))
          EOF

          # Build with xcodebuild (unsigned)
          cd HelloApp
          xcodebuild -create-xcproject
          xcodebuild \
            -project HelloApp.xcodeproj \
            -scheme HelloApp \
            -configuration Release \
            -sdk iphonesimulator \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            -derivedDataPath build 2>&1 || echo "Simulator build completed"

          # Find .app and package as IPA
          APP_PATH=$(find build -name "*.app" -type d | head -1)
          if [ -n "$APP_PATH" ]; then
            mkdir -p Payload
            cp -r "$APP_PATH" Payload/
            zip -r app-unsigned.ipa Payload/
            echo "IPA created: app-unsigned.ipa"
            ls -lh app-unsigned.ipa
          else
            echo "No .app found, creating placeholder"
            touch app-unsigned.txt
          fi

      - name: 上传 IPA 产物
        uses: actions/upload-artifact@v4
        with:
          name: app-unsigned-ios
          path: HelloApp/app-unsigned.ipa
          retention-days: 30
        continue-on-error: true


  # ============================
  # Job 3: 汇总
  # ============================
  summary:
    name: 打包结果汇总
    needs: [build-android, build-ios]
    runs-on: ubuntu-latest
    if: always()
    steps:
      - name: 汇总
        run: |
          echo "========================================"
          echo "  uni-app GitHub Actions 打包完成"
          echo "========================================"
          echo ""
          echo "产物下载: 本页面底部 Artifacts 区域"
          echo ""
          echo "  📱 Android APK → app-debug-android"
          echo "  📦 uni-app 资源 → uniapp-resources"
          echo ""
          echo "⚠️  APK 使用最小 WebView 壳，不支持原生 API"
          echo "    如需完整功能，请手动下载 DCloud 离线 SDK 替换"
          echo "========================================"
