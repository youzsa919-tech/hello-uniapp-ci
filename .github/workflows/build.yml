name: Build APK & IPA

on:
  push:
    branches: [main, master]
  workflow_dispatch:

env:
  APPID: '__UNI__HelloUniApp'

jobs:

  # ============================
  # Job 1: 构建 Android APK
  # ============================
  build-android:
    name: Build Android APK
    runs-on: ubuntu-latest
    steps:
      - name: Checkout 源码
        uses: actions/checkout@v4

      - name: 安装 Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: 安装项目依赖
        run: npm install --legacy-peer-deps

      - name: 安装 uni-uts-v1 (编译器运行时)
        run: npm install @dcloudio/uni-uts-v1@3.0.0-alpha-5020120260710001 --legacy-peer-deps

      - name: 构建 uni-app (app-plus 平台)
        run: npm run build:app

      - name: 展示构建产物
        run: |
          echo "=== uni-app 构建产物 ==="
          find dist/build/app -type f | head -30
          echo "=== 总文件数 ==="
          find dist/build/app -type f | wc -l

      # ---------- 创建最小 Android 项目 ----------
      - name: 安装 JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: 安装 Android SDK
        uses: android-actions/setup-android@v3
        with:
          packages: 'platforms;android-34 build-tools;34.0.0'

      - name: 创建 Android 壳工程
        run: |
          APPID="${{ env.APPID }}"
          PACKAGE="com.hello.uniapp"

          # 项目目录结构
          mkdir -p app/src/main/java/com/hello/uniapp
          mkdir -p app/src/main/assets/apps/$APPID/www
          mkdir -p app/src/main/res/values
          mkdir -p app/src/main/res/drawable

          # 复制 uni-app 构建产物到 assets
          if [ -d "dist/build/app/www" ]; then
            cp -r dist/build/app/www/* app/src/main/assets/apps/$APPID/www/
          else
            cp -r dist/build/app/* app/src/main/assets/apps/$APPID/www/
          fi

          # settings.gradle
          cat > settings.gradle << 'EOF'
          pluginManagement {
              repositories {
                  google()
                  mavenCentral()
                  gradlePluginPortal()
              }
          }
          dependencyResolutionManagement {
              repositoriesMode.set(RepositoriesMode.FAIL_ON_PROJECT_REPOS)
              repositories {
                  google()
                  mavenCentral()
              }
          }
          rootProject.name = "HelloUniApp"
          include ':app'
          EOF

          # build.gradle (root)
          cat > build.gradle << 'EOF'
          plugins {
              id 'com.android.application' version '8.2.0' apply false
          }
          EOF

          # app/build.gradle
          cat > app/build.gradle << EOF
          plugins {
              id 'com.android.application'
          }
          android {
              namespace "$PACKAGE"
              compileSdk 34
              defaultConfig {
                  applicationId "$PACKAGE"
                  minSdk 21
                  targetSdk 34
                  versionCode 1
                  versionName "1.0.0"
              }
              buildTypes {
                  release {
                      minifyEnabled false
                  }
                  debug {
                      debuggable true
                  }
              }
              compileOptions {
                  sourceCompatibility JavaVersion.VERSION_17
                  targetCompatibility JavaVersion.VERSION_17
              }
          }
          dependencies {
              implementation 'androidx.appcompat:appcompat:1.6.1'
              implementation 'androidx.webkit:webkit:1.9.0'
          }
          EOF

          # AndroidManifest.xml
          cat > app/src/main/AndroidManifest.xml << EOF
          <?xml version="1.0" encoding="utf-8"?>
          <manifest xmlns:android="http://schemas.android.com/apk/res/android">
              <uses-permission android:name="android.permission.INTERNET" />
              <uses-permission android:name="android.permission.ACCESS_NETWORK_STATE" />
              <application
                  android:label="Hello UniApp"
                  android:supportsRtl="true"
                  android:usesCleartextTraffic="true"
                  android:hardwareAccelerated="true">
                  <activity
                      android:name=".MainActivity"
                      android:configChanges="orientation|screenSize|keyboardHidden"
                      android:exported="true">
                      <intent-filter>
                          <action android:name="android.intent.action.MAIN" />
                          <category android:name="android.intent.category.LAUNCHER" />
                      </intent-filter>
                  </activity>
              </application>
          </manifest>
          EOF

          # MainActivity.java
          cat > app/src/main/java/com/hello/uniapp/MainActivity.java << 'JAVAEOF'
          package com.hello.uniapp;

          import android.app.Activity;
          import android.os.Bundle;
          import android.webkit.WebChromeClient;
          import android.webkit.WebSettings;
          import android.webkit.WebView;
          import android.webkit.WebViewClient;

          public class MainActivity extends Activity {
              private WebView webView;

              @Override
              protected void onCreate(Bundle savedInstanceState) {
                  super.onCreate(savedInstanceState);
                  webView = new WebView(this);
                  setContentView(webView);

                  WebSettings settings = webView.getSettings();
                  settings.setJavaScriptEnabled(true);
                  settings.setDomStorageEnabled(true);
                  settings.setAllowFileAccess(true);
                  settings.setAllowContentAccess(true);
                  settings.setMediaPlaybackRequiresUserGesture(false);
                  settings.setMixedContentMode(WebSettings.MIXED_CONTENT_ALWAYS_ALLOW);

                  webView.setWebChromeClient(new WebChromeClient());
                  webView.setWebViewClient(new WebViewClient());

                  // 加载 uni-app 入口页面
                  webView.loadUrl("file:///android_asset/apps/__UNI__HelloUniApp/www/index.html");
              }

              @Override
              public void onBackPressed() {
                  if (webView.canGoBack()) {
                      webView.goBack();
                  } else {
                      super.onBackPressed();
                  }
              }
          }
          JAVAEOF

          # gradle.properties
          cat > gradle.properties << 'EOF'
          org.gradle.jvmargs=-Xmx2048m -Dfile.encoding=UTF-8
          android.useAndroidX=true
          EOF

          # 展示结构
          echo "=== Android 项目结构 ==="
          find . -maxdepth 4 -not -path '*/node_modules/*' -not -path '*/.git/*' -not -path '*/dist/*' -type f | sort

      - name: 赋予 Gradle 执行权限并编译 APK
        run: |
          # 生成 local.properties
          echo "sdk.dir=$ANDROID_HOME" > local.properties

          # 下载 gradle wrapper
          gradle wrapper --gradle-version 8.5

          # 编译 debug APK
          ./gradlew assembleDebug --no-daemon --stacktrace

      - name: 查找并上传 APK
        run: |
          APK=$(find app/build -name "*.apk" -type f | head -1)
          echo "APK: $APK"
          ls -lh "$APK"
          cp "$APK" app-debug.apk

      - name: 上传 APK 产物
        uses: actions/upload-artifact@v4
        with:
          name: app-debug-android
          path: app-debug.apk
          retention-days: 30

      - name: 上传 uni-app 资源包 (备用)
        uses: actions/upload-artifact@v4
        with:
          name: uniapp-resources
          path: dist/build/app/
          retention-days: 7


  # ============================
  # Job 2: 构建 iOS IPA (未签名)
  # ============================
  build-ios:
    name: Build iOS IPA (Unsigned)
    runs-on: macos-latest
    steps:
      - name: Checkout 源码
        uses: actions/checkout@v4

      - name: 安装 Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: 安装项目依赖
        run: npm install --legacy-peer-deps

      - name: 安装 uni-uts-v1 (编译器运行时)
        run: npm install @dcloudio/uni-uts-v1@3.0.0-alpha-5020120260710001 --legacy-peer-deps

      - name: 构建 uni-app (app-plus 平台)
        run: npm run build:app

      # ---------- 复制资源到 iOS 项目 ----------
      - name: 复制 uni-app 资源到 iOS 项目
        run: |
          mkdir -p ios/HelloApp/www
          if [ -d "dist/build/app/www" ]; then
            cp -r dist/build/app/www/* ios/HelloApp/www/
          else
            cp -r dist/build/app/* ios/HelloApp/www/
          fi
          echo "=== iOS 资源目录 ==="
          find ios/HelloApp/www -maxdepth 2 -type f | head -20

      # ---------- 生成 Xcode 项目并编译 ----------
      - name: 安装 xcodegen 并生成 Xcode 项目
        run: |
          brew install xcodegen
          cd ios
          xcodegen generate
          echo "=== Xcode 项目已生成 ==="
          ls -la *.xcodeproj/

      - name: 编译 iOS (无签名, arm64 真机架构)
        run: |
          cd ios
          xcodebuild \
            -project HelloApp.xcodeproj \
            -scheme HelloApp \
            -configuration Release \
            -sdk iphoneos \
            -arch arm64 \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            ONLY_ACTIVE_ARCH=NO \
            -derivedDataPath build \
            2>&1 | tee xcodebuild.log

      - name: 打包 IPA
        run: |
          APP_PATH=$(find ios/build -name "*.app" -type d | head -1)
          echo "App 路径: $APP_PATH"

          if [ -z "$APP_PATH" ]; then
            echo "!!! 未找到 .app, 检查编译日志"
            grep -i "error:\|BUILD FAILED" ios/xcodebuild.log || true
            exit 1
          fi

          mkdir -p Payload
          cp -r "$APP_PATH" Payload/
          zip -r app-unsigned.ipa Payload/
          rm -rf Payload
          echo "=== IPA 生成成功 ==="
          ls -lh app-unsigned.ipa

      - name: 上传 IPA 产物
        uses: actions/upload-artifact@v4
        with:
          name: app-unsigned-ios
          path: app-unsigned.ipa
          retention-days: 30


  # ============================
  # Job 3: 汇总
  # ============================
  summary:
    name: 打包结果汇总
    needs: [build-android, build-ios]
    runs-on: ubuntu-latest
    if: always()
    steps:
      - name: 汇总
        run: |
          echo "========================================"
          echo "  uni-app GitHub Actions 打包完成"
          echo "========================================"
          echo ""
          echo "产物下载: 本页面底部 Artifacts 区域"
          echo ""
          echo "  📱 Android APK → app-debug-android"
          echo "  📦 uni-app 资源 → uniapp-resources"
          echo ""
          echo "⚠️  APK 使用最小 WebView 壳，不支持原生 API"
          echo "    如需完整功能，请手动下载 DCloud 离线 SDK 替换"
          echo "========================================"
